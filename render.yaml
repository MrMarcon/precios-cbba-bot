services:
  - type: web
    name: precios-cbba-bot
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: python bot.py smart-order
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: cron
    name: precios-cbba-bot-daily
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 12 * * *"
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
